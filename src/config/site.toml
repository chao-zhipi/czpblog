[config.site]
title = "czp"
description = "记录和分享我的开发者旅程。"
pageTitle = "czp | Digital Space"
pageDescription = "czp的对外个人数字空间"
repository = "https://github.com/chao-zhipi"
footerNote = "© 2026 czpirr. All rights reserved."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.code]
lightTheme = "catppuccin-latte"
darkTheme = "catppuccin-macchiato"
lineNumbers = true
wrap = true
preserveIndent = true
collapseStyle = "collapsible-auto"

[config.comments]
enabled = false
provider = "none"
show_on_posts = false

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = ""
repo_id = ""
category = ""
category_id = ""
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
light_theme = "light"
dark_theme = "dark"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "czp"
handle = "@czp"
role = "Developer"
company = "Gzhu"
location = "China"
email = "czpir@outlook.com"
website = "https://github.com/chao-zhipi"
github = "https://github.com/chao-zhipi"
meta = "实验室搬砖人"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
